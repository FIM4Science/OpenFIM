# experiments/configs/finetune_mocap_35_short.yaml
# Subject 35 has 16 training paths × 50 steps; 4 test paths × 300 steps.
task: mocap
subject: "35"
variant: short

mode: batch_trajectory
epochs: 200
lr: 5.0e-6
weight-decay: 1.0e-4
integrator: improved_euler
n-inner-steps: 5
freeze-encoder: false

eval-every: 10
ckpt-every: 50
log-every: 10
run-dir: runs
ckpt-dir: checkpoints/finetune

device: cpu

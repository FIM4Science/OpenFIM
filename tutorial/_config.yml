title: FIM
author: Lamarr's DL4SD group
logo: imgs/logo.png

execute:
  execute_notebooks: force
  timeout: 7200 # Keep this high, since most of our notebooks take longer


bibtex_bibfiles:
  - references.bib

repository:
  url: https://github.com/FIM4Science/OpenFIM
  branch: main

html:
  use_issues_button: true
  use_repository_button: true

only_build_toc_files: false


parse:
  myst_enable_extensions:
    - colon_fence
    - linkify
    - dollarmath
    - substitution
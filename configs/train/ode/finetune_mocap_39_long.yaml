# experiments/configs/finetune_mocap_39_long.yaml
task: mocap
subject: "39"
variant: long

mode: batch_trajectory
epochs: 200
lr: 5.0e-6
weight-decay: 1.0e-4
integrator: improved_euler
n-inner-steps: 5
freeze-encoder: false

eval-every: 10
ckpt-every: 50
log-every: 10
run-dir: results/ode/logs
ckpt-dir: results/ode/checkpoints/finetune

device: cpu

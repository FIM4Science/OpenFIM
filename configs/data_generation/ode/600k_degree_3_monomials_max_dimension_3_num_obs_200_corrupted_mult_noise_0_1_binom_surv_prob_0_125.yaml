experiment_name: ode_corrupted_dim_1_2_3_deg_3_polys_monomial_survival_uniform
dataset_type: "FIMSDEpDataset" #FIMSDEpDataset,FIMPOODEDataset,FIMCompartmentDataset

integration:
  method: "EulerMaruyama"
  time_length: 10
  steps_per_dt: 20
  num_steps: 200
  num_paths: 8
  num_additional_paths: 20
  num_locations: 2048
  chunk_size: 20000 # generate at one time so many realizations (to filter Nans)
  reject_threshold: 100
  stochastic: false

locations:
  type: random_cube
  extension_perc: 0.2

train:

    ##################### Dimension 1 #####################

  - name: Polynomials
    data_bulk_name: train_dim_1_split_0
    num_realizations: 25000
    observed_dimension: null
    state_dim: 1
    redo: &redo false
    enforce_positivity: &enforce_positivity "abs"
    max_degree_drift: &max_degree_drift 3
    max_degree_diffusion: &max_degree_diffusion 0
    observation_noise: &observation_noise
      relative: false
      distribution:
        name: normal_multiplicative_with_uniform_std
        max: 0.1
    mask_sampler_params: &mask_sampler_params
      name: fim.sampling.grid_samplers.BernoulliMaskSampler
      survival_probability: 0.125 # this is minimum survival probability per time series, sampled between this and 1; should replicate ODEFormer train distribution behavior, if time series are 200 obs large
      min_survival_count: 4
    drift_params: &drift_params
      uniform_degrees: true
      distribution:
        name: normal
        std: 1
      scale: &scale
        sample_per_dimension: false
        distribution: "uniform"
        min: 0.0
        max: 2.0
    diffusion_params: &diffusion_params
      uniform_degrees: true
      distribution:
        name: fix
        fix_value: 0.0
      scale: *scale
    initial_state: &initial_state
      distribution: "normal"
      mean: 0.0
      std_dev: 1.0
      activation: null

